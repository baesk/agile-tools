<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/university-of-melbourne-design-system-ba1c60e1-44aa-4acc-82aa-4515ae552e73/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/university-of-melbourne-design-system-ba1c60e1-44aa-4acc-82aa-4515ae552e73/tokens/colors.css">
  <link rel="stylesheet" href="_ds/university-of-melbourne-design-system-ba1c60e1-44aa-4acc-82aa-4515ae552e73/tokens/typography.css">
  <link rel="stylesheet" href="_ds/university-of-melbourne-design-system-ba1c60e1-44aa-4acc-82aa-4515ae552e73/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/university-of-melbourne-design-system-ba1c60e1-44aa-4acc-82aa-4515ae552e73/styles.css">
  <script src="_ds/university-of-melbourne-design-system-ba1c60e1-44aa-4acc-82aa-4515ae552e73/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #root { height: 100%; }
  </style>
  <meta name="ext-resource-dependency" content="Initiative Roadmap (standalone).html" data-resource-id="tool0">
  <meta name="ext-resource-dependency" content="Prioritisation Template (Standalone).html" data-resource-id="tool1">
  <meta name="ext-resource-dependency" content="Quick Assessment (Standalone).html" data-resource-id="tool2">
  <meta name="ext-resource-dependency" content="Sprint Review Report (Standalone).html" data-resource-id="tool3">
  <meta name="ext-resource-dependency" content="Sprint Kick-off Report (Standalone).html" data-resource-id="tool4">
  <template id="__bundler_thumbnail" data-bg-color="#000F46">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#000F46"></rect>
      <rect x="360" y="300" width="360" height="26" rx="4" fill="#FFFFFF"></rect>
      <rect x="360" y="360" width="240" height="26" rx="4" fill="#46C8F0"></rect>
      <rect x="360" y="420" width="320" height="26" rx="4" fill="#FFFFFF"></rect>
      <rect x="326" y="288" width="6" height="170" rx="3" fill="#46C8F0"></rect>
    </svg>
  </template>
</helmet>
<div style="display:flex; height:100vh; width:100%; overflow:hidden; background:#F7F7F4; font-family:'Source Sans 3', Arial, sans-serif;">

  <aside style="width:{{ sidebarWidth }}; flex:0 0 {{ sidebarWidth }}; background:#000F46; color:#FFFFFF; display:flex; flex-direction:column; height:100%;">

    <div style="height:84px; box-sizing:border-box; padding:0 24px; border-bottom:1px solid rgba(255,255,255,0.12); display:flex; align-items:center; gap:14px;">
      <div style="display:flex; flex-direction:column; gap:3px;">
        <span style="font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:22px; line-height:26px; letter-spacing:-0.01em; font-variation-settings:'SOFT' 50, 'WONK' 0, 'opsz' 72;">Agile tools</span>
        <span style="font-size:12px; line-height:16px; letter-spacing:0.06em; text-transform:uppercase; color:rgba(255,255,255,0.55);">Product Owner workspace</span>
      </div>
    </div>

    <nav style="flex:1; padding:16px 14px; display:flex; flex-direction:column; gap:4px;">
      <button type="button" onClick="{{ select0 }}" style="{{ nav0style }}" style-hover="background:rgba(255,255,255,0.06)">
        <span style="width:3px; align-self:stretch; border-radius:2px; background:{{ accent }}; opacity:{{ bar0 }};"></span>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><circle cx="6" cy="19" r="3"></circle><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"></path><circle cx="18" cy="5" r="3"></circle></svg>
        <span style="display:flex; flex-direction:column; gap:2px; text-align:left; min-width:0;">
          <span style="font-size:15px; font-weight:600; line-height:1.2; color:#FFFFFF;">Initiative Roadmap</span>
          <span style="display:{{ navSubDisplay }}; font-size:12px; line-height:1.25; color:rgba(255,255,255,0.55);">Timeline of initiatives</span>
        </span>
      </button>

      <button type="button" onClick="{{ select1 }}" style="{{ nav1style }}" style-hover="background:rgba(255,255,255,0.06)">
        <span style="width:3px; align-self:stretch; border-radius:2px; background:{{ accent }}; opacity:{{ bar1 }};"></span>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
        <span style="display:flex; flex-direction:column; gap:2px; text-align:left; min-width:0;">
          <span style="font-size:15px; font-weight:600; line-height:1.2; color:#FFFFFF;">Prioritisation Template</span>
          <span style="display:{{ navSubDisplay }}; font-size:12px; line-height:1.25; color:rgba(255,255,255,0.55);">Full initiative scoring</span>
        </span>
      </button>

      <button type="button" onClick="{{ select2 }}" style="{{ nav2style }}" style-hover="background:rgba(255,255,255,0.06)">
        <span style="width:3px; align-self:stretch; border-radius:2px; background:{{ accent }}; opacity:{{ bar2 }};"></span>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"></path><path d="m13.4 12.6 3.6-3.6"></path><path d="M3.34 19a10 10 0 1 1 17.32 0"></path></svg>
        <span style="display:flex; flex-direction:column; gap:2px; text-align:left; min-width:0;">
          <span style="font-size:15px; font-weight:600; line-height:1.2; color:#FFFFFF;">Quick Assessment</span>
          <span style="display:{{ navSubDisplay }}; font-size:12px; line-height:1.25; color:rgba(255,255,255,0.55);">Rapid effort vs. value</span>
        </span>
      </button>

      <button type="button" onClick="{{ select3 }}" style="{{ nav3style }}" style-hover="background:rgba(255,255,255,0.06)">
        <span style="width:3px; align-self:stretch; border-radius:2px; background:{{ accent }}; opacity:{{ bar3 }};"></span>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M8 13h8"></path><path d="M8 17h5"></path></svg>
        <span style="display:flex; flex-direction:column; gap:2px; text-align:left; min-width:0;">
          <span style="font-size:15px; font-weight:600; line-height:1.2; color:#FFFFFF;">Sprint Review Report</span>
          <span style="display:{{ navSubDisplay }}; font-size:12px; line-height:1.25; color:rgba(255,255,255,0.55);">Sprint outcomes summary</span>
        </span>
      </button>

      <button type="button" onClick="{{ select4 }}" style="{{ nav4style }}" style-hover="background:rgba(255,255,255,0.06)">
        <span style="width:3px; align-self:stretch; border-radius:2px; background:{{ accent }}; opacity:{{ bar4 }};"></span>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;"><path d="M5 3v16a2 2 0 0 0 2 2h12"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
        <span style="display:flex; flex-direction:column; gap:2px; text-align:left; min-width:0;">
          <span style="font-size:15px; font-weight:600; line-height:1.2; color:#FFFFFF;">Sprint Kick-off Report</span>
          <span style="display:{{ navSubDisplay }}; font-size:12px; line-height:1.25; color:rgba(255,255,255,0.55);">Sprint goals &amp; plan</span>
        </span>
      </button>
    </nav>

    <div style="padding:16px 24px; border-top:1px solid rgba(255,255,255,0.12); font-size:11px; line-height:1.4; color:rgba(255,255,255,0.45);">
      Agile tools workspace
    </div>
  </aside>

  <main style="flex:1; display:flex; flex-direction:column; min-width:0; height:100%;">
    <header style="flex:0 0 auto; height:84px; box-sizing:border-box; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:0 28px; background:#FFFFFF; border-bottom:1px solid #DDDEE6;">
      <div style="display:flex; flex-direction:column; gap:3px; min-width:0;">
        <h1 style="margin:0; font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:24px; line-height:26px; color:#000F46; letter-spacing:-0.01em; font-variation-settings:'SOFT' 50, 'WONK' 0, 'opsz' 72;">{{ title }}</h1>
        <p style="margin:0; font-size:13.5px; line-height:16px; color:#4A4E63;">{{ desc }}</p>
      </div>
      <a href="{{ src }}" target="_blank" rel="noopener" style="flex:0 0 auto; display:inline-flex; align-items:center; gap:8px; padding:9px 16px; border:1px solid #DDDEE6; border-radius:3px; color:#000F46; text-decoration:none; font-size:14px; font-weight:600; background:#FFFFFF;" style-hover="background:#F2F3F7">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>
        Open full screen
      </a>
    </header>

    <div style="flex:1; position:relative; min-height:0; background:#F7F7F4;">
      <iframe src="{{ src }}" title="{{ title }}" style="position:absolute; inset:0; width:100%; height:100%; border:0; display:block;"></iframe>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },
  &quot;accentColor&quot;: {
    &quot;editor&quot;: &quot;color&quot;,
    &quot;default&quot;: &quot;#46C8F0&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Appearance&quot;,
    &quot;options&quot;: [&quot;#46C8F0&quot;, &quot;#9FB825&quot;, &quot;#FFD629&quot;, &quot;#EB7BBE&quot;]
  },
  &quot;sidebarWidth&quot;: {
    &quot;editor&quot;: &quot;range&quot;,
    &quot;default&quot;: 284,
    &quot;min&quot;: 240,
    &quot;max&quot;: 340,
    &quot;step&quot;: 4,
    &quot;unit&quot;: &quot;px&quot;,
    &quot;tsType&quot;: &quot;number&quot;,
    &quot;section&quot;: &quot;Appearance&quot;
  },
  &quot;showSubtitles&quot;: {
    &quot;editor&quot;: &quot;boolean&quot;,
    &quot;default&quot;: true,
    &quot;tsType&quot;: &quot;boolean&quot;,
    &quot;section&quot;: &quot;Appearance&quot;
  }
}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    let saved = 0;
    try { const v = parseInt(localStorage.getItem('agile-tools-active'), 10); if (v >= 0 && v <= 4) saved = v; } catch (e) {}
    this.state = { active: saved };
    this.tools = [
      { title: 'Initiative Roadmap', desc: 'A visual timeline of your product initiatives across quarters.', file: 'Initiative Roadmap (standalone).html' },
      { title: 'Prioritisation Template', desc: 'Score and rank initiatives on the full weighted matrix.', file: 'Prioritisation Template (Standalone).html' },
      { title: 'Quick Assessment', desc: 'Rapidly plot initiatives on effort versus value.', file: 'Quick Assessment (Standalone).html' },
      { title: 'Sprint Review Report', desc: 'A summary of what was delivered, demoed and learned this sprint.', file: 'Sprint Review Report (Standalone).html' },
      { title: 'Sprint Kick-off Report', desc: 'Set the sprint goal, scope and plan at the start of the sprint.', file: 'Sprint Kick-off Report (Standalone).html' }
    ];
  }
  select(i) {
    this.setState({ active: i });
    try { localStorage.setItem('agile-tools-active', String(i)); } catch (e) {}
  }
  renderVals() {
    const a = this.state.active;
    const base = 'display:flex; align-items:center; gap:12px; width:100%; padding:11px 12px 11px 9px; border:0; border-radius:4px; cursor:pointer; text-align:left; transition:background 160ms cubic-bezier(0.2,0,0.1,1);';
    const bg = (i) => base + ' background:' + (a === i ? 'rgba(255,255,255,0.10)' : 'transparent') + ';';
    const t = this.tools[a];
    const res = (typeof window !== 'undefined' && window.__resources) ? window.__resources['tool' + a] : null;
    const accent = this.props.accentColor || '#46C8F0';
    const sidebarWidth = (this.props.sidebarWidth || 284) + 'px';
    const navSubDisplay = this.props.showSubtitles === false ? 'none' : 'block';
    return {
      accent,
      sidebarWidth,
      navSubDisplay,
      title: t.title,
      desc: t.desc,
      src: res || encodeURI(t.file),
      nav0style: bg(0), nav1style: bg(1), nav2style: bg(2), nav3style: bg(3), nav4style: bg(4),
      bar0: a === 0 ? 1 : 0, bar1: a === 1 ? 1 : 0, bar2: a === 2 ? 1 : 0, bar3: a === 3 ? 1 : 0, bar4: a === 4 ? 1 : 0,
      select0: () => this.select(0),
      select1: () => this.select(1),
      select2: () => this.select(2),
      select3: () => this.select(3),
      select4: () => this.select(4)
    };
  }
}
</script>
</body>
</html>
