document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

splay: swap;\n  src: url(\"d15c53f2-f584-4234-8ffb-b4f7564addf5\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4cc294d9-6671-47d7-bf5b-012daf71531a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6420c4c2-d957-4934-aafa-02e98437e42c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c565e659-8c17-4505-9a62-0f32d268b70e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   University of Melbourne — Colour palette\n   Source: Visual Identity Guidelines V2 (July 2025), pp. 12–18\n   Rule: Traditional Heritage Blue is the HERO colour in every\n   execution. Pair with ONE secondary colour (+ its shade) max.\n   Flat colour only — no gradients, shadows or highlights.\n   ============================================================ */\n\n:root {\n  /* ---- Primary -------------------------------------------- */\n  --heritage-blue: #000F46;        /* Traditional Heritage Blue — PMS 2757 */\n\n  /* ---- Secondary: Colours of Country ---------------------- */\n  /* (inspired by Billibellary's Walk, Parkville campus)        */\n  --river-red-gum: #9FB825;        /* PMS 382  */\n  --river-red-gum-shade: #2C421D;  /* PMS 7743 */\n\n  --black-sheoak: #FF2D3C;         /* PMS Warm Red */\n  --black-sheoak-shade: #78000D;   /* PMS 201 */\n\n  --yam-daisy: #FFD629;            /* PMS 116 */\n  --yam-daisy-shade: #A84500;      /* PMS 1595 */\n\n  --kookaburra: #46C8F0;           /* Laughing Kookaburra — PMS 2985 */\n  --kookaburra-shade: #003C55;     /* PMS 7701 */\n\n  --possum: #EB7BBE;               /* PMS 2037 */\n  --possum-shade: #73234B;         /* PMS 682 */\n\n  --greenstone: #ABC1A7;           /* Mt William Greenstone — PMS 5595 */\n  --greenstone-shade: #444A40;     /* PMS 4193 */\n\n  --magpie: #C8C8C8;               /* PMS Cool Gray 2 */\n  --magpie-shade: #2D2D2D;         /* PMS 4279 */\n\n  --white: #FFFFFF;\n  --black: #000000;\n\n  /* ---- Extended neutrals (digital-only, derived) ----------\n     The guideline permits additional tints/shades for digital\n     experiences, light page backgrounds, tables and graphs.    */\n  --paper:      #F7F7F4;   /* warm off-white page background     */\n  --paper-blue: #F2F3F7;   /* faint blue-grey surface            */\n  --ink-60:     #4A4E63;   /* muted blue-grey text on light      */\n  --ink-40:     #8589A0;   /* secondary / meta text              */\n  --hairline:   #DDDEE6;   /* 1px borders, table rules           */\n  --hairline-strong: #C3C5D2;\n\n  /* ---- Semantic aliases ----------------------------------- */\n  --surface-page:    var(--paper);\n  --surface-card:    var(--white);\n  --surface-hero:    var(--heritage-blue);\n  --surface-sunken:  var(--paper-blue);\n\n  --text-strong:     var(--heritage-blue);  /* default copy + headings */\n  --text-body:       var(--ink-60);\n  --text-muted:      var(--ink-40);\n  --text-on-hero:    var(--white);\n\n  --border-subtle:   var(--hairline);\n  --border-strong:   var(--hairline-strong);\n  --border-hero:     var(--heritage-blue);\n\n  --accent:          var(--heritage-blue);\n  --accent-text:     var(--white);\n\n  /* Status colours mapped onto the palette (for PO tools:\n     backlog, sprint boards, trackers). Use sparingly.          */\n  --status-done:      var(--river-red-gum-shade);\n  --status-done-soft: var(--river-red-gum);\n  --status-progress:  var(--kookaburra-shade);\n  --status-progress-soft: var(--kookaburra);\n  --status-blocked:   var(--black-sheoak-shade);\n  --status-blocked-soft: var(--black-sheoak);\n  --status-todo:      var(--ink-40);\n  --status-todo-soft: var(--magpie);\n  --status-review:    var(--yam-daisy-shade);\n  --status-review-soft: var(--yam-daisy);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   University of Melbourne — Typography\n   Source: Visual Identity Guidelines V2, pp. 19–26\n   - Fraunces: master headings only. Digital ≥30pt. Sentence case.\n     Variable settings (web): wght 300–600, SOFT 50, WONK 0, opsz 72.\n     Lighter weights are sophisticated; heavier weights playful.\n     Never embellish (no shadows/outlines). Italics: sparingly.\n   - Source Sans 3: subheadings + body copy. Title/sentence case.\n   - Office fallback: Georgia (for Fraunces), Arial (for both).\n   ============================================================ */\n\n:root {\n  /* ---- Families ------------------------------------------- */\n  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;\n  --font-body: 'Source Sans 3', Arial, Helvetica, sans-serif;\n  /* Office / web-safe equivalents — use in PPT/Word/Excel exports */\n  --font-display-office: Georgia, serif;\n  --font-body-office: Arial, sans-serif;\n\n  /* ---- Fraunces variable axes (recommended web settings) -- */\n  --fraunces-soft: 50;   /* @kind other */\n  --fraunces-wonk: 0;    /* @kind other */\n\n  /* ---- Weights -------------------------------------------- */\n  --w-light: 300;     /* @kind font */\n  --w-regular: 400;   /* @kind font */\n  --w-semibold: 600;  /* @kind font */\n  --w-bold: 700;      /* @kind font */\n\n  /* ---- Type scale (px @ screen) --------------------------- */\n  --t-display:   72px;   /* hero headline               */\n  --t-h1:        52px;   /* heading large               */\n  --t-h2:        38px;   /* heading medium              */\n  --t-h3:        28px;   /* heading small (Fraunces min ~30) */\n  --t-subhead:   20px;   /* Source Sans subheading      */\n  --t-lead:      22px;   /* intro copy (can be Fraunces) */\n  --t-body:      17px;   /* body copy                   */\n  --t-small:     14px;   /* meta / captions             */\n  --t-fine:      12px;   /* CRICOS, footnotes (min 6pt print) */\n\n  /* ---- Leading -------------------------------------------- */\n  --lh-display: 1.04;    /* @kind other */\n  --lh-heading: 1.08;    /* @kind other */\n  --lh-body: 1.5;        /* @kind other */\n  --lh-tight: 1.2;       /* @kind other */\n\n  /* ---- Tracking ------------------------------------------- */\n  --tracking-display: -0.01em;  /* @kind other */\n  --tracking-body: 0;    /* @kind other */\n}\n\n/* ---- Headings: Fraunces, sentence case ------------------- */\n.um-display,\n.um-h1,\n.um-h2,\n.um-h3 {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tracking-display);\n  color: var(--text-strong);\n  font-variation-settings: 'SOFT' 50, 'WONK' 0, 'opsz' 72;\n  text-wrap: balance;\n  margin: 0;\n}\n.um-display { font-size: var(--t-display); }\n.um-h1 { font-size: var(--t-h1); }\n.um-h2 { font-size: var(--t-h2); font-weight: var(--w-regular); }\n.um-h3 { font-size: var(--t-h3); font-weight: var(--w-regular); line-height: var(--lh-heading); }\n\n/* Headings highlight word: italics, sparingly */\n.um-heading-em { font-style: italic; font-weight: var(--w-light); }\n\n/* ---- Subheadings: Source Sans 3 -------------------------- */\n.um-subhead {\n  font-family: var(--font-body);\n  font-weight: var(--w-semibold);\n  font-size: var(--t-subhead);\n  line-height: var(--lh-tight);\n  letter-spacing: 0;\n  color: var(--text-strong);\n  margin: 0;\n}\n\n/* ---- Lead / intro copy ----------------------------------- */\n.um-lead {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  font-size: var(--t-lead);\n  line-height: 1.3;\n  color: var(--text-strong);\n  margin: 0;\n}\n\n/* ---- Body ------------------------------------------------- */\n.um-body {\n  font-family: var(--font-body);\n  font-weight: var(--w-regular);\n  font-size: var(--t-body);\n  line-height: var(--lh-body);\n  color: var(--text-body);\n  text-wrap: pretty;\n  margin: 0;\n}\n\n/* ---- Paragraph heading (title case, never italic) -------- */\n.um-para-heading {\n  font-family: var(--font-body);\n  font-weight: var(--w-bold);\n  font-size: var(--t-body);\n  line-height: var(--lh-tight);\n  color: var(--text-strong);\n  margin: 0;\n}\n\n/* ---- Small / functional copy ----------------------------- */\n.um-small {\n  font-family: var(--font-body);\n  font-weight: var(--w-regular);\n  font-size: var(--t-small);\n  line-height: 1.4;\n  color: var(--text-muted);\n  margin: 0;\n}\n\n/* ---- Eyebrow / overline (functional label) --------------- */\n.um-eyebrow {\n  font-family: var(--font-body);\n  font-weight: var(--w-bold);\n  font-size: var(--t-small);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--text-muted);\n  margin: 0;\n}\n\n/* ---- CRICOS line ----------------------------------------- */\n.um-cricos {\n  font-family: var(--font-body);\n  font-weight: var(--w-regular);\n  font-size: var(--t-fine);\n  letter-spacing: 0.02em;\n  color: var(--text-muted);\n  margin: 0;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   University of Melbourne — Spacing, radii, borders, shadow\n   The brand is built on a modular square grid (Fibonacci).\n   Spacing steps echo that: a small base unit scaled up.\n   Visual language is FLAT — borders & generous space do the\n   work that shadows would elsewhere. Square corners dominate;\n   radii are minimal and reserved for digital UI affordances.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale (4px base) --------------------------- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ---- Modular grid -------------------------------------- */\n  --module: 160px;          /* a \"1\" module reference size     */\n  --grid-gutter: 2px;       /* hairline gap between modules     */\n  --outer-margin: 5%;       /* outer margin = 5% of smallest side */\n  --inner-margin: 24px;     /* inner margin within a module     */\n\n  /* ---- Radii (kept tight — the brand is square) ----------- */\n  --radius-0: 0;            /* default: square, like the logo  */\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-pill: 999px;     /* tags / status chips only        */\n\n  /* ---- Borders ------------------------------------------- */\n  --border-width: 1px;\n  --border-width-strong: 2px;\n  --border: var(--border-width) solid var(--border-subtle);\n  --border-hero-line: var(--border-width-strong) solid var(--heritage-blue);\n\n  /* ---- Elevation -----------------------------------------\n     Used very sparingly (digital UI only). The print brand is\n     flat; on screen a faint shadow lifts cards off the page.   */\n  --shadow-none: none;\n  --shadow-card: 0 1px 2px rgba(0, 15, 70, 0.06), 0 8px 24px rgba(0, 15, 70, 0.06);\n  --shadow-pop: 0 4px 12px rgba(0, 15, 70, 0.10), 0 16px 48px rgba(0, 15, 70, 0.12);\n\n  /* ---- Motion --------------------------------------------\n     Restrained. Quick, confident fades — no bounce.            */\n  --ease: cubic-bezier(0.2, 0, 0.1, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur: 200ms;      /* @kind other */\n  --dur-slow: 360ms; /* @kind other */\n\n  /* ---- Layout widths ------------------------------------- */\n  --measure: 64ch;          /* @kind other */\n  --container: 1200px;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   University of Melbourne Design System — global entry point\n   Consumers link THIS file. It is an @import manifest only.\n   Source of truth: Visual Identity Guidelines V2 (July 2025).\n   ============================================================ */\n\n/* ============================================================\n   University of Melbourne — Webfonts\n   Primary: Fraunces (modern decorative serif) — headings only\n   Secondary: Source Sans 3 — subheadings + body\n   Both are open-source Google fonts (fonts.google.com).\n   Loaded here from Google Fonts so consumers need no binaries.\n   ============================================================ */\n\n/* vietnamese */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: italic;\n  font-weight: 300 600;\n  font-display: swap;\n  src: url(\"e34143fe-64ae-407c-ba92-1e94a6de3775\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: italic;\n  font-weight: 300 600;\n  font-display: swap;\n  src: url(\"4d5f4639-3993-4854-a463-0e8cc6881f8f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: italic;\n  font-weight: 300 600;\n  font-display: swap;\n  src: url(\"dd16c215-90bc-473a-ba01-37 n. Pair with ONE secondary colour (+ its shade) max.\n   Flat colour only — no gradients, shadows or highlights.\n   ============================================================ */\n\n:root {\n  /* ---- Primary -------------------------------------------- */\n  --heritage-blue: #000F46;        /* Traditional Heritage Blue — PMS 2757 */\n\n  /* ---- Secondary: Colours of Country ---------------------- */\n  /* (inspired by Billibellary's Walk, Parkville campus)        */\n  --river-red-gum: #9FB825;        /* PMS 382  */\n  --river-red-gum-shade: #2C421D;  /* PMS 7743 */\n\n  --black-sheoak: #FF2D3C;         /* PMS Warm Red */\n  --black-sheoak-shade: #78000D;   /* PMS 201 */\n\n  --yam-daisy: #FFD629;            /* PMS 116 */\n  --yam-daisy-shade: #A84500;      /* PMS 1595 */\n\n  --kookaburra: #46C8F0;           /* Laughing Kookaburra — PMS 2985 */\n  --kookaburra-shade: #003C55;     /* PMS 7701 */\n\n  --possum: #EB7BBE;               /* PMS 2037 */\n  --possum-shade: #73234B;         /* PMS 682 */\n\n  --greenstone: #ABC1A7;           /* Mt William Greenstone — PMS 5595 */\n  --greenstone-shade: #444A40;     /* PMS 4193 */\n\n  --magpie: #C8C8C8;               /* PMS Cool Gray 2 */\n  --magpie-shade: #2D2D2D;         /* PMS 4279 */\n\n  --white: #FFFFFF;\n  --black: #000000;\n\n  /* ---- Extended neutrals (digital-only, derived) ----------\n     The guideline permits additional tints/shades for digital\n     experiences, light page backgrounds, tables and graphs.    */\n  --paper:      #F7F7F4;   /* warm off-white page background     */\n  --paper-blue: #F2F3F7;   /* faint blue-grey surface            */\n  --ink-60:     #4A4E63;   /* muted blue-grey text on light      */\n  --ink-40:     #8589A0;   /* secondary / meta text              */\n  --hairline:   #DDDEE6;   /* 1px borders, table rules           */\n  --hairline-strong: #C3C5D2;\n\n  /* ---- Semantic aliases ----------------------------------- */\n  --surface-page:    var(--paper);\n  --surface-card:    var(--white);\n  --surface-hero:    var(--heritage-blue);\n  --surface-sunken:  var(--paper-blue);\n\n  --text-strong:     var(--heritage-blue);  /* default copy + headings */\n  --text-body:       var(--ink-60);\n  --text-muted:      var(--ink-40);\n  --text-on-hero:    var(--white);\n\n  --border-subtle:   var(--hairline);\n  --border-strong:   var(--hairline-strong);\n  --border-hero:     var(--heritage-blue);\n\n  --accent:          var(--heritage-blue);\n  --accent-text:     var(--white);\n\n  /* Status colours mapped onto the palette (for PO tools:\n     backlog, sprint boards, trackers). Use sparingly.          */\n  --status-done:      var(--river-red-gum-shade);\n  --status-done-soft: var(--river-red-gum);\n  --status-progress:  var(--kookaburra-shade);\n  --status-progress-soft: var(--kookaburra);\n  --status-blocked:   var(--black-sheoak-shade);\n  --status-blocked-soft: var(--black-sheoak);\n  --status-todo:      var(--ink-40);\n  --status-todo-soft: var(--magpie);\n  --status-review:    var(--yam-daisy-shade);\n  --status-review-soft: var(--yam-daisy);\n}\n\n/* ============================================================\n   University of Melbourne — Typography\n   Source: Visual Identity Guidelines V2, pp. 19–26\n   - Fraunces: master headings only. Digital ≥30pt. Sentence case.\n     Variable settings (web): wght 300–600, SOFT 50, WONK 0, opsz 72.\n     Lighter weights are sophisticated; heavier weights playful.\n     Never embellish (no shadows/outlines). Italics: sparingly.\n   - Source Sans 3: subheadings + body copy. Title/sentence case.\n   - Office fallback: Georgia (for Fraunces), Arial (for both).\n   ============================================================ */\n\n:root {\n  /* ---- Families ------------------------------------------- */\n  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;\n  --font-body: 'Source Sans 3', Arial, Helvetica, sans-serif;\n  /* Office / web-safe equivalents — use in PPT/Word/Excel exports */\n  --font-display-office: Georgia, serif;\n  --font-body-office: Arial, sans-serif;\n\n  /* ---- Fraunces variable axes (recommended web settings) -- */\n  --fraunces-soft: 50;   /* @kind other */\n  --fraunces-wonk: 0;    /* @kind other */\n\n  /* ---- Weights -------------------------------------------- */\n  --w-light: 300;     /* @kind font */\n  --w-regular: 400;   /* @kind font */\n  --w-semibold: 600;  /* @kind font */\n  --w-bold: 700;      /* @kind font */\n\n  /* ---- Type scale (px @ screen) --------------------------- */\n  --t-display:   72px;   /* hero headline               */\n  --t-h1:        52px;   /* heading large               */\n  --t-h2:        38px;   /* heading medium              */\n  --t-h3:        28px;   /* heading small (Fraunces min ~30) */\n  --t-subhead:   20px;   /* Source Sans subheading      */\n  --t-lead:      22px;   /* intro copy (can be Fraunces) */\n  --t-body:      17px;   /* body copy                   */\n  --t-small:     14px;   /* meta / captions             */\n  --t-fine:      12px;   /* CRICOS, footnotes (min 6pt print) */\n\n  /* ---- Leading -------------------------------------------- */\n  --lh-display: 1.04;    /* @kind other */\n  --lh-heading: 1.08;    /* @kind other */\n  --lh-body: 1.5;        /* @kind other */\n  --lh-tight: 1.2;       /* @kind other */\n\n  /* ---- Tracking ------------------------------------------- */\n  --tracking-display: -0.01em;  /* @kind other */\n  --tracking-body: 0;    /* @kind other */\n}\n\n/* ---- Headings: Fraunces, sentence case ------------------- */\n.um-display,\n.um-h1,\n.um-h2,\n.um-h3 {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tracking-display);\n  color: var(--text-strong);\n  font-variation-settings: 'SOFT' 50, 'WONK' 0, 'opsz' 72;\n  text-wrap: balance;\n  margin: 0;\n}\n.um-display { font-size: var(--t-display); }\n.um-h1 { font-size: var(--t-h1); }\n.um-h2 { font-size: var(--t-h2); font-weight: var(--w-regular); }\n.um-h3 { font-size: var(--t-h3); font-weight: var(--w-regular); line-height: var(--lh-heading); }\n\n/* Headings highlight word: italics, sparingly */\n.um-heading-em { font-style: italic; font-weight: var(--w-light); }\n\n/* ---- Subheadings: Source Sans 3 -------------------------- */\n.um-subhead {\n  font-family: var(--font-body);\n  font-weight: var(--w-semibold);\n  font-size: var(--t-subhead);\n  line-height: var(--lh-tight);\n  letter-spacing: 0;\n  color: var(--text-strong);\n  margin: 0;\n}\n\n/* ---- Lead / intro copy ----------------------------------- */\n.um-lead {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  font-size: var(--t-lead);\n  line-height: 1.3;\n  color: var(--text-strong);\n  margin: 0;\n}\n\n/* ---- Body ------------------------------------------------- */\n.um-body {\n  font-family: var(--font-body);\n  font-weight: var(--w-regular);\n  font-size: var(--t-body);\n  line-height: var(--lh-body);\n  color: var(--text-body);\n  text-wrap: pretty;\n  margin: 0;\n}\n\n/* ---- Paragraph heading (title case, never italic) -------- */\n.um-para-heading {\n  font-family: var(--font-body);\n  font-weight: var(--w-bold);\n  font-size: var(--t-body);\n  line-height: var(--lh-tight);\n  color: var(--text-strong);\n  margin: 0;\n}\n\n/* ---- Small / functional copy ----------------------------- */\n.um-small {\n  font-family: var(--font-body);\n  font-weight: var(--w-regular);\n  font-size: var(--t-small);\n  line-height: 1.4;\n  color: var(--text-muted);\n  margin: 0;\n}\n\n/* ---- Eyebrow / overline (functional label) --------------- */\n.um-eyebrow {\n  font-family: var(--font-body);\n  font-weight: var(--w-bold);\n  font-size: var(--t-small);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--text-muted);\n  margin: 0;\n}\n\n/* ---- CRICOS line ----------------------------------------- */\n.um-cricos {\n  font-family: var(--font-body);\n  font-weight: var(--w-regular);\n  font-size: var(--t-fine);\n  letter-spacing: 0.02em;\n  color: var(--text-muted);\n  margin: 0;\n}\n\n/* ============================================================\n   University of Melbourne — Spacing, radii, borders, shadow\n   The brand is built on a modular square grid (Fibonacci).\n   Spacing steps echo that: a small base unit scaled up.\n   Visual language is FLAT — borders & generous space do the\n   work that shadows would elsewhere. Square corners dominate;\n   radii are minimal and reserved for digital UI affordances.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale (4px base) --------------------------- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ---- Modular grid -------------------------------------- */\n  --module: 160px;          /* a \"1\" module reference size     */\n  --grid-gutter: 2px;       /* hairline gap between modules     */\n  --outer-margin: 5%;       /* outer margin = 5% of smallest side */\n  --inner-margin: 24px;     /* inner margin within a module     */\n\n  /* ---- Radii (kept tight — the brand is square) ----------- */\n  --radius-0: 0;            /* default: square, like the logo  */\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-pill: 999px;     /* tags / status chips only        */\n\n  /* ---- Borders ------------------------------------------- */\n  --border-width: 1px;\n  --border-width-strong: 2px;\n  --border: var(--border-width) solid var(--border-subtle);\n  --border-hero-line: var(--border-width-strong) solid var(--heritage-blue);\n\n  /* ---- Elevation -----------------------------------------\n     Used very sparingly (digital UI only). The print brand is\n     flat; on screen a faint shadow lifts cards off the page.   */\n  --shadow-none: none;\n  --shadow-card: 0 1px 2px rgba(0, 15, 70, 0.06), 0 8px 24px rgba(0, 15, 70, 0.06);\n  --shadow-pop: 0 4px 12px rgba(0, 15, 70, 0.10), 0 16px 48px rgba(0, 15, 70, 0.12);\n\n  /* ---- Motion --------------------------------------------\n     Restrained. Quick, confident fades — no bounce.            */\n  --ease: cubic-bezier(0.2, 0, 0.1, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur: 200ms;      /* @kind other */\n  --dur-slow: 360ms; /* @kind other */\n\n  /* ---- Layout widths ------------------------------------- */\n  --measure: 64ch;          /* @kind other */\n  --container: 1200px;\n}\n\n<\u002Fstyle>\n<script src=\"7f3f92c3-652c-487c-b486-4061cd97d9dc\"><\u002Fscript>\n<style>\n  @media print {\n    @page { size: A4; margin: 0; }\n    body { background: #fff !important; }\n    [data-screen-only] { display: none !important; }\n    .kickoff-sheet { box-shadow: none !important; }\n  }\n  [data-field]:focus { outline: 2px solid rgba(0,15,70,0.35); outline-offset: 2px; border-radius: 2px; }\n  [data-field]:hover { background: rgba(0,15,70,0.04); border-radius: 2px; }\n  [data-field][data-placeholder]:empty:before { content: attr(data-placeholder); color: #9AA0B4; font-weight: 300; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"background:#F2F3F7; padding:32px; min-height:100vh; box-sizing:border-box; font-family:'Source Sans 3', Arial, sans-serif;\">\n\n  <!-- upload toolbar — screen only -->\n  <div data-screen-only=\"true\" style=\"width:794px; max-width:100%; margin:0 auto 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n    <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:13.5px; color:#4A4E63;\">\n      <span style=\"{{ statusDot }}\"><\u002Fspan><span>{{ statusLabel }}<\u002Fspan>\n    <\u002Fspan>\n    <div style=\"margin-left:auto; display:flex; align-items:center; gap:8px;\">\n      <button onclick=\"{{ onPrint }}\" style=\"background:#fff; color:#000F46; font-size:14px; font-weight:600; padding:9px 16px; border-radius:3px; cursor:pointer; border:1px solid #C9CEDE;\">Print / PDF<\u002Fbutton>\n      <button onclick=\"{{ onClear }}\" disabled=\"{{ clearDisabled }}\" style=\"{{ clearStyle }}\">Clear<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div ref=\"{{ rootRef }}\" onblur=\"{{ onFieldBlur }}\" class=\"kickoff-sheet\" style=\"width:794px; max-width:100%; margin:0 auto; background:#fff; box-shadow:0 1px 2px rgba(0,15,70,0.06), 0 8px 24px rgba(0,15,70,0.06); display:flex; flex-direction:column;\">\n\n    <!-- header band -->\n    <div style=\"background:#000F46; color:#fff; display:flex; align-items:center; gap:16px; padding:22px 48px;\">\n      <div style=\"font-family:'Fraunces', Georgia, serif; font-size:22px; line-height:1.1; font-variation-settings:'SOFT' 50,'WONK' 0;\">Sprint kick-off<\u002Fdiv>\n      <label style=\"margin-left:auto; display:inline-flex; align-items:center; gap:8px; border-bottom:2px solid rgba(255,255,255,0.55); padding-bottom:3px; cursor:pointer;\">\n        <select value=\"{{ sprint }}\" onchange=\"{{ onSprintChange }}\" style=\"appearance:none; -webkit-appearance:none; font-family:'Source Sans 3', Arial, sans-serif; font-size:15px; font-weight:700; color:#fff; background:transparent; border:none; padding:0; margin:0; cursor:pointer;\">\n          <option value=\"\" style=\"color:#000F46;\">Select sprint month…<\u002Foption>\n          <sc-for list=\"{{ months }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <option value=\"{{ m }}\" style=\"color:#000F46;\">{{ m }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:0 0 auto; pointer-events:none;\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n      <\u002Flabel>\n    <\u002Fdiv>\n\n    <!-- body -->\n    <div style=\"padding:36px 48px 8px; flex:1;\">\n      <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"border-top:3px solid #000F46; margin:0 0 16px;\"><\u002Fdiv>\n      <p style=\"font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#8589A0; margin:0 0 12px;\">Sprint goal<\u002Fp>\n      <div data-field=\"goal\" data-placeholder=\"What is the team aiming to achieve this sprint? State the goal in plain terms.\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" style=\"border:1px dashed #C9CEDE; border-radius:3px; padding:16px 18px; font-family:'Fraunces', Georgia, serif; font-weight:300; font-size:23px; line-height:1.28; color:#000F46; min-height:60px; margin:0 0 26px; font-variation-settings:'SOFT' 50,'WONK' 0,'opsz' 72; cursor:text;\"><\u002Fdiv>\n\n      <!-- metric strip -->\n      <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:#DDDEE6; border:1px solid #DDDEE6; border-radius:4px; overflow:hidden; margin-bottom:26px;\">\n        <div style=\"background:#fff; padding:15px 16px;\">\n          <div style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:29px; color:#000F46; line-height:1;\">{{ targetPoints }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8589A0; margin-top:6px;\">Target story points<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; padding:15px 16px;\">\n          <div style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:29px; color:#000F46; line-height:1;\">{{ itemCount }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8589A0; margin-top:6px;\">Backlog items committed<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; padding:15px 16px;\">\n          <div style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:29px; color:#000F46; line-height:1;\">{{ areaCount }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8589A0; margin-top:6px;\">Business areas engaged<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; padding:15px 16px;\">\n          <div style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:29px; color:#000F46; line-height:1;\">{{ componentCount }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8589A0; margin-top:6px;\">Components touched<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; padding:15px 16px;\">\n          <div style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:29px; color:#B4232E; line-height:1;\">{{ highCount }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8589A0; margin-top:6px;\">High-priority items<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- engagement chips -->\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;\">\n        <div>\n          <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#8589A0; margin:0 0 9px;\">Business areas engaging <span data-screen-only=\"true\" style=\"font-weight:600; color:#B6BAC9; letter-spacing:0;\">· tap to filter<\u002Fspan><\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n            <sc-for list=\"{{ areas }}\" as=\"a\" hint-placeholder-count=\"5\">\n              <span onclick=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#8589A0; margin:0 0 9px;\">Components touched <span data-screen-only=\"true\" style=\"font-weight:600; color:#B6BAC9; letter-spacing:0;\">· tap to filter<\u002Fspan><\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n            <sc-for list=\"{{ components }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <span onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- backlog table -->\n      <div style=\"display:flex; align-items:center; gap:12px; margin:0 0 14px; padding-bottom:10px; border-bottom:2px solid #000F46;\">\n        <h2 style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:21px; color:#000F46; margin:0; font-variation-settings:'SOFT' 50,'WONK' 0;\">Sprint backlog<\u002Fh2>\n        <span style=\"margin-left:auto; display:inline-flex; align-items:center; gap:12px;\">\n          <sc-if value=\"{{ filterActive }}\" hint-placeholder-val=\"{{ false }}\">\n            <button data-screen-only=\"true\" onclick=\"{{ onClearFilters }}\" style=\"background:none; border:none; color:#00256E; font-size:12.5px; font-weight:600; cursor:pointer; padding:0; text-decoration:underline;\">Clear filters<\u002Fbutton>\n          <\u002Fsc-if>\n          <span style=\"display:inline-block; background:#EAF0DC; color:#2C421D; font-size:12.5px; font-weight:600; padding:4px 12px; border-radius:999px; white-space:nowrap;\">{{ backlogSummary }}<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:100%; margin-bottom:20px; font-size:12.5px;\">\n        <div style=\"display:grid; grid-template-columns:70px minmax(0,1fr) 118px 100px 40px; background:#000F46; color:#fff;\">\n          <div style=\"padding:8px 10px; font-weight:600; font-size:11.5px;\">Key<\u002Fdiv>\n          <div style=\"padding:8px 10px; font-weight:600; font-size:11.5px;\">Summary<\u002Fdiv>\n          <div style=\"padding:8px 10px; font-weight:600; font-size:11.5px;\">Priority<\u002Fdiv>\n          <div style=\"padding:8px 10px; font-weight:600; font-size:11.5px; text-align:center;\">Status<\u002Fdiv>\n          <div style=\"padding:8px 8px; font-weight:600; font-size:11.5px; text-align:right;\">Pts<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"12\">\n          <div style=\"{{ row.rowStyle }}\">\n            <div style=\"padding:7px 10px; font-family:ui-monospace,monospace; font-size:11.5px; color:#000F46; font-weight:600; white-space:nowrap;\">{{ row.key }}<\u002Fdiv>\n            <div style=\"padding:7px 10px; color:#3A3F57; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;\" title=\"{{ row.summary }}\">{{ row.summary }}<\u002Fdiv>\n            <div style=\"padding:7px 10px; white-space:nowrap;\"><span style=\"display:inline-flex; align-items:center; gap:6px; color:#4A4E63; font-weight:600;\"><span style=\"{{ row.priDot }}\"><\u002Fspan>{{ row.priority }}<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:7px 10px; text-align:center;\"><span style=\"{{ row.statusStyle }}\">{{ row.status }}<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:7px 8px; text-align:right; font-weight:700; color:#4A4E63;\">{{ row.points }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ empty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div ondragover=\"{{ onDragOver }}\" ondrop=\"{{ onDrop }}\" style=\"border:2px dashed #C9CEDE; border-radius:4px; padding:56px 40px; text-align:center; margin:8px 0 40px;\">\n        <div style=\"width:56px; height:56px; margin:0 auto 22px; background:#F2F3F7; border-radius:4px; display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#000F46\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 15V3\"><\u002Fpath><path d=\"M6 9l6-6 6 6\"><\u002Fpath><path d=\"M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Fraunces', Georgia, serif; font-weight:400; font-size:26px; color:#000F46; margin:0 0 10px; font-variation-settings:'SOFT' 50,'WONK' 0;\">Import your Jira sprint export<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.5; color:#6B7086; max-width:52ch; margin:0 auto 26px;\">Drag a CSV here, or choose a file. Keys, summaries, business areas, statuses, story points and components populate automatically — nothing leaves your browser.<\u002Fp>\n        <div style=\"display:flex; gap:10px; justify-content:center;\">\n          <label ondragover=\"{{ onDragOver }}\" ondrop=\"{{ onDrop }}\" style=\"display:inline-flex; align-items:center; background:#000F46; color:#fff; font-size:14px; font-weight:600; padding:10px 18px; border-radius:3px; cursor:pointer; border:1px solid #000F46;\">\n            Choose CSV file\n            <input type=\"file\" accept=\".csv,text/csv\" onchange=\"{{ onFile }}\" style=\"display:none;\">\n          <\u002Flabel>\n          <button onclick=\"{{ onReset }}\" style=\"background:#fff; color:#000F46; font-size:14px; font-weight:600; padding:10px 18px; border-radius:3px; cursor:pointer; border:1px solid #C9CEDE;\">Load sample data<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- footer -->\n    <div style=\"border-top:2px solid #000F46; padding:14px 48px; display:flex; justify-content:space-between; font-size:12px; color:#8589A0;\">\n      <span>Sprint kick-off — prepared for delivery &amp; stakeholder review<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  ROWS_KEY = 'umel-kickoff-rows-v1';\n  META_KEY = 'umel-kickoff-meta-v1';\n\n  state = { rows: [], sourceLabel: 'SAMP-Sample-Sprint-Data.csv', areaFilter: [], compFilter: [], sprint: '', isSample: true };\n\n  buildMonths() {\n    return ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n  }\n\n  onSprintChange = (e) => { const v = e.target.value; this.setState({ sprint: v }, () => this.persistMeta()); };\n\n  sampleCSV() {\n    return `Key,Summary,Issue Type,Status,Priority,Assignee,Reporter,Business Area,Story Points,Components,Labels,Created,Updated\nSAMP-8012,Enrolment wizard: allow payment plan selection at point of enrolment,Story,In Progress,High,Carol Chang,James Holloway,Enrolments,8,Enrolment Wizard,SprintCandidate,2025-02-18,2026-07-01\nSAMP-8007,Redesign fee statement PDF for clarity and accessibility,Story,In Progress,Medium,,Sean Goegan,Fees,5,Fees & Payments,SprintCandidate,2025-03-06,2026-07-02\nSAMP-7994,Admissions: bulk decision upload for course coordinators,Story,To Do,High,,Georgia Bryden,Admissions,13,Admissions Portal,SprintCandidate,2025-01-27,2026-06-30\nSAMP-7981,Scholarship eligibility rules engine refresh,Story,To Do,Medium,,Priya Nair,Scholarships,8,Fees & Payments,SprintCandidate,2025-04-14,2026-06-28\nSAMP-7962,Timetable clash detection for cross-faculty subjects,Story,In Progress,High,Daniel Osei,Chris Thornton,Timetabling,5,Timetabling,SprintCandidate,2025-02-02,2026-07-03\nSAMP-7950,Results release notification preferences,Story,To Do,Low,,Audrey Colbath,Internal SAS,3,Enrolment Wizard,,2025-05-19,2026-06-25\nSAMP-7937,Graduation ceremony seat allocation tool,Story,To Do,Low,,James Holloway,Admissions,5,Admissions Portal,SprintCandidate,2025-03-30,2026-06-22\nSAMP-7925,Enquiry routing by topic and priority,Story,In Progress,Medium,Simon Summerfield,Georgia Bryden,Enrolments,3,Integration Layer,SprintCandidate,2025-02-25,2026-07-04\nSAMP-7910,Resolve duplicate student identities during record merge,Story,Blocked,High,Carol Chang,Supriya Nalinikanth,Enrolments,13,Enrolment Wizard,\"SprintCandidate, Risk\",2025-01-15,2026-07-05\nSAMP-7899,Course planner: prerequisite validation at plan build,Story,To Do,Medium,,Chris Thornton,Enrolments,8,Enrolment Wizard,SprintCandidate,2025-04-01,2026-06-29\nSAMP-7884,Fees: refund workflow for withdrawn subjects,Story,In Progress,Medium,Priya Nair,Sean Goegan,Fees,5,Fees & Payments,SprintCandidate,2025-03-11,2026-07-01\nSAMP-7870,Publish admissions status changes to CRM via webhook,Story,To Do,High,Daniel Osei,Andrew Morley,\"Admissions, Internal SAS\",8,Integration Layer,\"SprintCandidate, Integration\",2025-02-08,2026-07-02\nSAMP-7856,Careers: work-integrated learning placement tracker,Story,To Do,Low,,James Holloway,Careers & Employability,13,Integration Layer,SprintCandidate,2025-05-02,2026-06-20\nSAMP-7841,Identity: multi-factor authentication rollout for staff portal,Story,In Review,High,Simon Summerfield,Supriya Nalinikanth,Internal SAS,5,Identity & Access,\"SprintCandidate, Security\",2025-01-20,2026-07-04\nSAMP-7830,Examinations: redesign special consideration form,Story,To Do,Medium,,Audrey Colbath,Internal SAS,3,Enrolment Wizard,SprintCandidate,2025-04-22,2026-06-27\nSAMP-7818,Enrolment: leave of absence self-service request,Story,To Do,Medium,,Georgia Bryden,Enrolments,8,Enrolment Wizard,SprintCandidate,2025-03-18,2026-07-03\nSAMP-7805,Scholarships: automated stipend payment schedule,Story,Blocked,Medium,Carol Chang,Priya Nair,Scholarships,8,Fees & Payments,\"SprintCandidate, Risk\",2025-02-12,2026-07-05\nSAMP-7792,Timetabling: room capacity utilisation reporting,Story,To Do,Low,,Chris Thornton,Timetabling,2,Timetabling,,2025-05-27,2026-06-18\nSAMP-7778,Graduations: digital testamur delivery,Story,In Progress,High,Daniel Osei,James Holloway,Admissions,13,Admissions Portal,SprintCandidate,2025-01-31,2026-07-02\nSAMP-7761,Knowledge base article versioning,Story,To Do,Low,,Georgia Bryden,Enrolments,2,Integration Layer,,2025-06-03,2026-06-15\nSAMP-7749,Nightly data reconciliation dashboard,Story,In Progress,Medium,Simon Summerfield,Andrew Morley,Internal SAS,21,Integration Layer,\"SprintCandidate, Data\",2025-02-05,2026-07-04`;\n  }\n\n  parseCSV(text) {\n    text = text.replace(/\\r\\n/g, '\\n').replace(/\\r/g, '\\n');\n    const rows = []; let field = '', record = [], inQ = false;\n    for (let i = 0; i < text.length; i++) {\n      const c = text[i];\n      if (inQ) {\n        if (c === '\"') { if (text[i + 1] === '\"') { field += '\"'; i++; } else { inQ = false; } }\n        else { field += c; }\n      } else if (c === '\"') { inQ = true; }\n      else if (c === ',') { record.push(field); field = ''; }\n      else if (c === '\\n') { record.push(field); rows.push(record); record = []; field = ''; }\n      else { field += c; }\n    }\n    if (field !== '' || record.length) { record.push(field); rows.push(record); }\n    return rows;\n  }\n\n  toObjects(text) {\n    const grid = this.parseCSV(text).filter(r => r.length > 1 || (r[0] && r[0].trim() !== ''));\n    if (!grid.length) return [];\n    const head = grid[0].map(h => h.trim().toLowerCase());\n    const idx = n => head.indexOf(n);\n    const iKey = idx('key'), iSum = idx('summary'), iStat = idx('status'), iPri = idx('priority'),\n      iArea = idx('business area'), iPts = idx('story points'), iComp = idx('components');\n    return grid.slice(1).filter(r => (r[iKey] || '').trim() !== '').map(r => ({\n      key: (r[iKey] || '').trim(),\n      summary: (r[iSum] || '').trim(),\n      status: (r[iStat] || '').trim() || 'New',\n      priority: (r[iPri] || '').trim() || '—',\n      area: (r[iArea] || '').trim(),\n      points: parseFloat(r[iPts]) || 0,\n      component: (r[iComp] || '').trim(),\n    }));\n  }\n\n  componentDidMount() {\n    let rows = null, label = 'SAMP-Sample-Sprint-Data.csv', isSample = true;\n    try { const s = localStorage.getItem(this.ROWS_KEY); if (s) { const p = JSON.parse(s); if (p.rows && p.rows.length) { rows = p.rows; label = p.label || 'imported.csv'; isSample = false; } } } catch (e) {}\n    if (!rows) rows = this.toObjects(this.sampleCSV());\n    this.setState({ rows, sourceLabel: label, isSample });\n    this.restoreMeta();\n  }\n\n  restoreMeta() {\n    const root = this.rootRef.current; if (!root) return;\n    let meta = {};\n    try { meta = JSON.parse(localStorage.getItem(this.META_KEY) || '{}'); } catch (e) {}\n    root.querySelectorAll('[data-field]').forEach(el => {\n      const k = el.dataset.field;\n      if (meta[k] != null && meta[k] !== '') el.textContent = meta[k];\n    });\n    if (meta.sprint && this.buildMonths().includes(meta.sprint)) this.setState({ sprint: meta.sprint });\n  }\n\n  persistMeta() {\n    const root = this.rootRef.current; if (!root) return;\n    const meta = {};\n    root.querySelectorAll('[data-field]').forEach(f => { meta[f.dataset.field] = f.textContent; });\n    meta.sprint = this.state.sprint;\n    try { localStorage.setItem(this.META_KEY, JSON.stringify(meta)); } catch (e) {}\n  }\n\n  onFieldBlur = (e) => {\n    const el = e.target;\n    if (!el || !el.dataset || !el.dataset.field) return;\n    this.persistMeta();\n  };\n\n  ingestText(text, label) {\n    const rows = this.toObjects(text);\n    if (!rows.length) { alert('No rows found. Expected a Jira CSV with Key, Summary, Status, Priority, Business Area, Story Points and Components columns.'); return; }\n    this.setState({ rows, sourceLabel: label, isSample: false, areaFilter: [], compFilter: [] });\n    try { localStorage.setItem(this.ROWS_KEY, JSON.stringify({ rows, label })); } catch (e) {}\n  }\n\n  readFile(file) {\n    if (!file) return;\n    const r = new FileReader();\n    r.onload = () => this.ingestText(String(r.result), file.name);\n    r.readAsText(file);\n  }\n\n  onFile = (e) => { this.readFile(e.target.files && e.target.files[0]); };\n  onDragOver = (e) => { e.preventDefault(); };\n  onDrop = (e) => { e.preventDefault(); this.readFile(e.dataTransfer.files && e.dataTransfer.files[0]); };\n  onReset = () => {\n    try { localStorage.removeItem(this.ROWS_KEY); } catch (e) {}\n    this.setState({ rows: this.toObjects(this.sampleCSV()), sourceLabel: 'SAMP-Sample-Sprint-Data.csv', isSample: true, areaFilter: [], compFilter: [] });\n  };\n  onClear = () => {\n    try { localStorage.removeItem(this.ROWS_KEY); } catch (e) {}\n    this.setState({ rows: [], sourceLabel: 'No file loaded', isSample: false, areaFilter: [], compFilter: [] });\n  };\n  onPrint = () => { window.print(); };\n\n  splitMulti(v) { return (v || '').split(',').map(s => s.trim()).filter(Boolean); }\n\n  toggle(list, name) { return list.includes(name) ? list.filter(x => x !== name) : list.concat([name]); }\n  toggleArea = (name) => () => this.setState(s => ({ areaFilter: this.toggle(s.areaFilter, name) }));\n  toggleComp = (name) => () => this.setState(s => ({ compFilter: this.toggle(s.compFilter, name) }));\n  onClearFilters = () => this.setState({ areaFilter: [], compFilter: [] });\n\n  statusStyleFor(status) {\n    const s = (status || '').toLowerCase();\n    let bg = '#EEF0F6', fg = '#3A3F57';\n    if (/done|closed|complete|resolved/.test(s)) { bg = '#EAF0DC'; fg = '#2C421D'; }\n    else if (/progress|active/.test(s)) { bg = '#DDF3FB'; fg = '#003C55'; }\n    else if (/review|test/.test(s)) { bg = '#FFF3CC'; fg = '#A84500'; }\n    else if (/block/.test(s)) { bg = '#FBE0E2'; fg = '#78000D'; }\n    else if (/new|to ?do|backlog|open|selected|commit/.test(s)) { bg = '#E4EAF6'; fg = '#00256E'; }\n    return { display: 'inline-block', background: bg, color: fg, fontWeight: 600, fontSize: '11px', padding: '3px 9px', borderRadius: '2px', whiteSpace: 'nowrap' };\n  }\n\n  priDotFor(priority) {\n    const p = (priority || '').toLowerCase();\n    let c = '#9AA0B4';\n    if (p === 'high' || p === 'highest') c = '#B4232E';\n    else if (p === 'medium') c = '#C98A00';\n    else if (p === 'low' || p === 'lowest') c = '#5C9A57';\n    return { display: 'inline-block', width: '7px', height: '7px', borderRadius: '50%', background: c, flex: '0 0 auto' };\n  }\n\n  renderVals() {\n    const rows = this.state.rows || [];\n    const areaSet = new Set(), compSet = new Set();\n    let points = 0, high = 0;\n    rows.forEach(r => {\n      points += r.points || 0;\n      if ((r.priority || '').toLowerCase() === 'high' || (r.priority || '').toLowerCase() === 'highest') high++;\n      this.splitMulti(r.area).forEach(a => areaSet.add(a));\n      this.splitMulti(r.component).forEach(c => compSet.add(c));\n    });\n    const fmtPts = Number.isInteger(points) ? points : points.toFixed(1);\n\n    const isSample = this.state.isSample, hasData = rows.length > 0;\n    const statusDot = { display: 'inline-block', width: '9px', height: '9px', borderRadius: '50%', background: hasData ? '#5C9A57' : '#B6BAC9', flex: '0 0 auto' };\n    const statusLabel = hasData ? (this.state.sourceLabel + (isSample ? ' (sample)' : '') + ' · ' + rows.length + ' issues') : 'No data imported yet';\n    const clearDisabled = !hasData;\n    const btnBase = { fontSize: '14px', fontWeight: 600, padding: '9px 16px', borderRadius: '3px' };\n    const clearStyle = clearDisabled\n      ? Object.assign({}, btnBase, { background: '#fff', color: '#B6BAC9', border: '1px solid #E7E8EF', cursor: 'default' })\n      : Object.assign({}, btnBase, { background: '#fff', color: '#000F46', border: '1px solid #C9CEDE', cursor: 'pointer' });\n\n    const areaFilter = this.state.areaFilter || [], compFilter = this.state.compFilter || [];\n    const filtered = rows.filter(r => {\n      const rA = this.splitMulti(r.area), rC = this.splitMulti(r.component);\n      const aOk = areaFilter.length === 0 || areaFilter.some(a => rA.includes(a));\n      const cOk = compFilter.length === 0 || compFilter.some(c => rC.includes(c));\n      return aOk && cOk;\n    });\n\n    const chip = (label, sel, outlined) => ({\n      label,\n      onClick: outlined ? this.toggleComp(label) : this.toggleArea(label),\n      style: sel\n        ? { display: 'inline-block', background: '#000F46', color: '#fff', fontSize: '12.5px', fontWeight: 600, padding: '4px 10px', borderRadius: '2px', border: '1px solid #000F46', cursor: 'pointer', userSelect: 'none' }\n        : { display: 'inline-block', background: outlined ? '#fff' : '#EEF0F6', color: outlined ? '#3A3F57' : '#000F46', fontSize: '12.5px', fontWeight: 600, padding: '4px 10px', borderRadius: '2px', border: outlined ? '1px solid #C9CEDE' : '1px solid transparent', cursor: 'pointer', userSelect: 'none' },\n    });\n    const areaChips = Array.from(areaSet).map(a => chip(a, areaFilter.includes(a), false));\n    const compChips = Array.from(compSet).map(c => chip(c, compFilter.includes(c), true));\n\n    const viewRows = filtered.map((r, i) => ({\n      key: r.key,\n      summary: r.summary,\n      area: r.area || '—',\n      component: r.component || '—',\n      priority: r.priority,\n      status: r.status,\n      points: Number.isInteger(r.points) ? r.points : r.points.toFixed(1),\n      priDot: this.priDotFor(r.priority),\n      statusStyle: this.statusStyleFor(r.status),\n      rowStyle: { display: 'grid', gridTemplateColumns: '70px minmax(0,1fr) 118px 100px 40px', alignItems: 'center', borderBottom: '1px solid #E7E8EF', background: i % 2 === 1 ? '#F7F8FB' : '#fff' },\n    }));\n\n    return {\n      rows: viewRows,\n      targetPoints: fmtPts,\n      itemCount: rows.length,\n      areaCount: areaSet.size,\n      componentCount: compSet.size,\n      highCount: high,\n      areas: areaChips,\n      components: compChips.length ? compChips : [chip('—', false, true)],\n      backlogSummary: (() => {\n        let fp = 0; filtered.forEach(r => fp += r.points || 0);\n        const p = Number.isInteger(fp) ? fp : fp.toFixed(1);\n        return filtered.length === rows.length\n          ? (rows.length + ' items · ' + p + ' pts')\n          : (filtered.length + ' of ' + rows.length + ' items · ' + p + ' pts');\n      })(),\n      filterActive: areaFilter.length > 0 || compFilter.length > 0,\n      onClearFilters: this.onClearFilters,\n      statusDot, statusLabel, clearDisabled, clearStyle, hasData, empty: !hasData,\n      onPrint: this.onPrint,\n      onClear: this.onClear,\n      months: this.buildMonths(),\n      sprint: this.state.sprint,\n      onSprintChange: this.onSprintChange,\n      rootRef: this.rootRef,\n      onFieldBlur: this.onFieldBlur,\n      onFile: this.onFile,\n      onDrop: this.onDrop,\n      onDragOver: this.onDragOver,\n      onReset: this.onReset,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
